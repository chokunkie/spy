<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มคดีลับ (Case File)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Mitr:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../app/style.css">
    
    <style>
        body { padding: 20px; padding-bottom: 80px; background: var(--bg-cream); }
        .container { max-width: 700px; margin: 0 auto; padding-top: 20px; }
        
        .case-file-card {
            background: #fffdf5; border: 3px solid #334155; padding: 40px; 
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.2); position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><g fill="rgba(0,0,0,0.03)"><circle cx="10" cy="10" r="2"/></g></svg>');
        }
        
        .stamp-confidential {
            position: absolute; top: 30px; right: 30px; border: 4px solid #e11d48;
            color: #e11d48; font-family: 'Outfit', sans-serif; font-size: 28px;
            font-weight: 800; padding: 5px 15px; border-radius: 8px;
            transform: rotate(15deg); opacity: 0.8; letter-spacing: 2px;
        }

        .case-header { border-bottom: 2px solid #cbd5e1; padding-bottom: 20px; margin-bottom: 30px; }
        .case-header h2 { font-family: 'Mitr', sans-serif; font-size: 28px; color: #1e293b; margin: 0 0 10px 0; }
        .case-meta { font-family: 'Inter', sans-serif; color: #64748b; font-size: 14px; display: flex; gap: 20px; flex-wrap: wrap; }
        
        .evidence-box {
            background: rgba(0,0,0,0.02); border: 2px dashed #94a3b8; border-radius: 12px;
            padding: 30px; text-align: center; margin-bottom: 30px;
        }
        
        .evidence-placeholder {
            width: 100%; max-width: 400px; min-height: 200px; background: #e2e8f0;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px; color: #64748b; font-family: 'Mitr', sans-serif;
            font-size: 18px; border: 2px solid #cbd5e1; margin: 0 auto; padding: 20px;
        }

        .evidence-desc {
            font-family: 'Mitr', sans-serif; font-size: 16px; color: #334155;
            line-height: 1.7; background: white; padding: 20px; border: 1px solid #cbd5e1;
            border-left: 4px solid var(--ink-blue); box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        
        .evidence-desc p { margin: 0 0 10px 0; }
        .evidence-desc p:last-child { margin: 0; }

        .btn-action {
            display: block; width: 100%; text-align: center; background: var(--ink-blue);
            color: white; padding: 16px; text-decoration: none; font-family: 'Mitr', sans-serif;
            font-size: 18px; font-weight: 600; border-radius: 8px; margin-top: 30px;
            border: 2px solid #0f172a; box-shadow: 4px 4px 0px #0f172a; transition: all 0.2s;
        }
        .btn-action:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #0f172a; }
        
        .btn-outline {
            background: white; color: var(--ink-blue); margin-top: 12px;
            box-shadow: 4px 4px 0px rgba(10,36,99,0.1);
        }
        
        .error-screen { text-align: center; margin-top: 100px; font-family: 'Mitr', sans-serif; }
    </style>
</head>
<body>

<div class="container" id="main-container"></div>

<script src="data.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const qrHash = urlParams.get('qr');
    const container = document.getElementById('main-container');

    if (!qrHash || !qrData[qrHash]) {
        container.innerHTML = `
            <div class="error-screen doodle-card" style="padding:40px; background:white; border:3px solid var(--ink-blue);">
                <h1 style="color:var(--accent-red);">ไม่พบหลักฐาน</h1>
                <p>กรุณาสแกน QR Code และตอบรหัสผ่านให้ถูกต้องเพื่อเข้าสู่ระบบก่อน</p>
                <a href="test-qr.html" style="display:inline-block; margin-top:20px; padding:10px 20px; background:var(--ink-blue); color:white; text-decoration:none; border-radius:8px;">กลับเมนูทดสอบ</a>
            </div>
        `;
    } else {
        const data = qrData[qrHash];
        const timeNow = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

        let html = `
            <div class="case-file-card">
                <div class="stamp-confidential">EVIDENCE</div>
                
                <div class="case-header">
                    <h2>แฟ้มหลักฐาน: ${data.id}</h2>
                    <div class="case-meta">
                        <span><strong>สถานที่:</strong> ${data.title}</span>
                        <span><strong>เวลาเข้าถึง:</strong> ${timeNow}</span>
                    </div>
                </div>
                

                <div class="evidence-desc">
                    <p><strong>รายละเอียดข้อมูลลับ:</strong></p>
                    <p>${data.clue.desc}</p>
                </div>
            </div>
        `;
        
        container.innerHTML = html;
    }
</script>

</body>
</html>
